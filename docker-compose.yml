services:
  # ===========================================
  # Control plane - holds all secrets, proxies everything.
  # Joins both networks: agent-network (sandbox-facing) and cp-internal
  # (control-plane-and-sidecars). It's the only service on cp-internal that
  # the sandbox can transitively reach.
  # ===========================================
  control-plane:
    build: ./control-plane
    container_name: control-plane
    ports:
      - "8080:8080"
    environment:
      # The only services that ever see the Anthropic API key or the GitHub
      # PAT. The sandbox never receives either — that's the whole point.
      # The control plane injects each credential on outbound calls
      # (Anthropic for /v1/messages, GitHub for /mcp/github proxy).
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GITHUB_PAT=${GITHUB_PAT:-}
      # The github-mcp sidecar that the control plane proxies to. Unset →
      # /mcp/github returns 503.
      - GITHUB_MCP_UPSTREAM=${GITHUB_MCP_UPSTREAM:-http://github-mcp:8090}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=agent-workspaces
    networks:
      - agent-network
      - cp-internal
    depends_on:
      - minio

  # ===========================================
  # GitHub MCP sidecar.
  # Wraps GitHub's official stdio-only MCP server with mcp-proxy so the
  # control plane can reach it over HTTP/SSE. Lives on cp-internal only —
  # the sandbox cannot route to it directly even if it tried; the control
  # plane is the sole bridge.
  # ===========================================
  github-mcp:
    build: ./github-mcp
    container_name: github-mcp
    # No GITHUB_PERSONAL_ACCESS_TOKEN here — in HTTP mode, github-mcp-server
    # is multi-tenant and authenticates each request via the Authorization
    # header. The control plane injects the real PAT on each forwarded call,
    # so the credential lives ONLY in the control-plane container.
    networks:
      - cp-internal
    restart: unless-stopped

  # ===========================================
  # MinIO - S3-compatible storage (replaces AWS S3).
  # On agent-network because the sandbox uploads directly via presigned URLs
  # minted by the control plane.
  # ===========================================
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      # Tell MinIO its external URL so the console generates browser-reachable
      # preview links. Without this, preview URLs use the internal Docker
      # hostname (minio:9000) which the browser can't resolve.
      MINIO_SERVER_URL: "http://localhost:9000"
    volumes:
      - minio-data:/data
    networks:
      - agent-network

  # ===========================================
  # MinIO bootstrap - creates the bucket on startup
  # ===========================================
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/agent-workspaces --ignore-existing;
      echo 'Bucket ready';
      "
    networks:
      - agent-network

networks:
  # Sandbox-facing network. Sandbox containers attach here at launch time.
  agent-network:
    driver: bridge
  # Control-plane-only network. Sidecars (github-mcp, future MCPs) attach
  # here so the sandbox cannot route to them directly.
  cp-internal:
    driver: bridge

volumes:
  minio-data:
